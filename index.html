<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>City of Forest – Water Well Management</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0a1628" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #0a1628;
    --surface:  #101e36;
    --card:     #152241;
    --border:   #1e3358;
    --accent:   #2979ff;
    --accent2:  #00c9ff;
    --green:    #00e676;
    --orange:   #ff9100;
    --red:      #ff1744;
    --text:     #e8edf5;
    --muted:    #7a90b0;
    --font-h:   'Barlow Condensed', sans-serif;
    --font-b:   'Barlow', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-b); }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0a1628 0%, #0d2040 100%);
    border-bottom: 2px solid var(--accent);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(41,121,255,0.18);
  }
  .logo-icon { width: 40px; height: 40px; flex-shrink: 0; }
  .header-titles { flex: 1; }
  .header-titles h1 { font-family: var(--font-h); font-size: 1.35rem; font-weight: 800; letter-spacing: 1px; color: var(--accent2); line-height: 1; }
  .header-titles p  { font-size: .72rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .nav-tabs { display: flex; gap: 6px; flex-shrink: 0; }
  .nav-tab {
    font-family: var(--font-h); font-weight: 700; font-size: .85rem; letter-spacing: .5px;
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    border: 1.5px solid var(--border); background: transparent; color: var(--muted);
    transition: all .2s;
  }
  .nav-tab.active, .nav-tab:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── MAIN ── */
  main { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* ── WELL GRID ── */
  .wells-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
  .well-card {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 18px 16px; cursor: pointer;
    transition: all .2s; position: relative; overflow: hidden;
  }
  .well-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity .2s;
  }
  .well-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(41,121,255,.22); }
  .well-card:hover::before { opacity: 1; }
  .well-name { font-family: var(--font-h); font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .well-meta { font-size: .75rem; color: var(--muted); }
  .well-badge { display: inline-block; font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; background: rgba(41,121,255,.15); color: var(--accent2); border: 1px solid rgba(41,121,255,.3); margin-top: 8px; }

  /* ── SECTION HEADERS ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-header h2 { font-family: var(--font-h); font-size: 1.4rem; font-weight: 800; letter-spacing: .5px; color: var(--accent2); }
  .back-btn {
    font-family: var(--font-h); font-weight: 700; font-size: .85rem;
    padding: 7px 16px; border-radius: 7px; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface); color: var(--muted);
    transition: all .2s; display: flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--text); }

  /* ── TABS (well detail) ── */
  .detail-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .dtab {
    font-family: var(--font-h); font-weight: 700; font-size: .85rem;
    padding: 7px 16px; border-radius: 7px; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface); color: var(--muted);
    transition: all .2s;
  }
  .dtab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .dtab:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  /* ── FORMS ── */
  .form-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .form-card h3 { font-family: var(--font-h); font-size: 1rem; font-weight: 700; color: var(--accent2); margin-bottom: 14px; letter-spacing: .5px; text-transform: uppercase; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
  label { font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  input, textarea, select {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: var(--font-b); font-size: .9rem; padding: 8px 12px;
    transition: border-color .2s; outline: none; width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .btn {
    font-family: var(--font-h); font-weight: 700; font-size: .9rem; letter-spacing: .5px;
    padding: 9px 20px; border-radius: 8px; cursor: pointer; border: none;
    transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1565c0; }
  .btn-green  { background: var(--green); color: #000; }
  .btn-green:hover  { opacity: .85; }
  .btn-orange { background: var(--orange); color: #000; }
  .btn-orange:hover { opacity: .85; }
  .btn-red    { background: var(--red); color: #fff; font-size: .78rem; padding: 5px 12px; border-radius: 6px; }
  .btn-red:hover { opacity: .8; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── RECORDS TABLE ── */
  .records-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-row select { width: auto; min-width: 130px; font-size: .8rem; padding: 6px 10px; }
  table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  thead th { background: var(--surface); color: var(--muted); font-family: var(--font-h); font-weight: 700; letter-spacing: .8px; text-transform: uppercase; padding: 9px 10px; border-bottom: 2px solid var(--border); text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: rgba(41,121,255,.07); }
  td { padding: 8px 10px; vertical-align: top; }
  .td-ts { color: var(--muted); font-size: .73rem; white-space: nowrap; }
  .empty-msg { text-align: center; color: var(--muted); padding: 32px; font-size: .9rem; }

  /* ── NOTES ── */
  .note-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
  .note-ts { font-size: .72rem; color: var(--muted); margin-bottom: 4px; }
  .note-text { font-size: .88rem; line-height: 1.5; }
  .note-footer { display: flex; justify-content: flex-end; margin-top: 8px; }

  /* ── STAT CHIPS ── */
  .stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat-chip { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; flex: 1; min-width: 120px; }
  .stat-label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; }
  .stat-value { font-family: var(--font-h); font-size: 1.5rem; font-weight: 800; color: var(--accent2); margin-top: 2px; }

  /* ── GENERAL NOTES PAGE ── */
  .gnotes-wrap { max-width: 680px; }

  /* ── EXPORT PANEL ── */
  .export-panel { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .export-panel h3 { font-family: var(--font-h); font-size: 1rem; font-weight: 700; color: var(--orange); margin-bottom: 12px; letter-spacing: .5px; }
  .export-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 500px) {
    .nav-tabs { gap: 4px; }
    .nav-tab { font-size: .75rem; padding: 5px 10px; }
    .header-titles h1 { font-size: 1.1rem; }
    .wells-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="20" r="19" stroke="#2979ff" stroke-width="2"/>
    <path d="M20 8 C14 14 10 18 10 22 C10 28 14.5 32 20 32 C25.5 32 30 28 30 22 C30 18 26 14 20 8Z" fill="rgba(41,121,255,0.25)" stroke="#00c9ff" stroke-width="1.5"/>
    <line x1="20" y1="6" x2="20" y2="34" stroke="#2979ff" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="6" y1="20" x2="34" y2="20" stroke="#2979ff" stroke-width="1" stroke-dasharray="2 2"/>
  </svg>
  <div class="header-titles">
    <h1>Well Log</h1>
    <p>City of Forest, Mississippi</p>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('wells')">Wells</button>
    <button class="nav-tab" onclick="showPage('gnotes')">Gen. Notes</button>
  </div>
</header>

<main id="app"></main>

<script>
// ─── DATA STORE ─────────────────────────────────────────────────────────────
const WELLS = [
  { id: 'walmart',   name: 'Wal-Mart Well' },
  { id: 'trenton',   name: 'Trenton Rd Well' },
  { id: 'cedar',     name: 'Cedar Street Well' },
  { id: 'rg',        name: 'RG Well' },
  { id: 'oakpark',   name: 'Oak Park Well' },
  { id: 'hwy80',     name: 'Hwy 80 Well' },
];

function load(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

// runtime records: { id, wellId, timestamp, hours, startMeter, endMeter, gallons, notes }
// maintenance records: { id, wellId, timestamp, note }
// general notes: { id, timestamp, note }

function getRuntimeRecords(wellId) { return load('rt_' + wellId); }
function saveRuntimeRecords(wellId, d) { save('rt_' + wellId, d); }
function getMaintenanceNotes(wellId) { return load('mn_' + wellId); }
function saveMaintenanceNotes(wellId, d) { save('mn_' + wellId, d); }
function getGeneralNotes() { return load('general_notes'); }
function saveGeneralNotes(d) { save('general_notes', d); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function ts() { return new Date().toLocaleString('en-US', { dateStyle:'short', timeStyle:'short' }); }
function formatGal(n) { return Number(n).toLocaleString() + ' gal'; }

// ─── STATE ──────────────────────────────────────────────────────────────────
let page = 'wells';          // 'wells' | 'well_detail' | 'gnotes'
let activeWell = null;       // well object
let detailTab = 'runtime';   // 'runtime' | 'maintenance' | 'export'
let filterPeriod = 'all';

// ─── ROUTING ────────────────────────────────────────────────────────────────
function showPage(p) {
  page = p; activeWell = null;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.textContent.trim().startsWith(p === 'gnotes' ? 'Gen' : 'Wells')));
  render();
}
function openWell(well) { page = 'well_detail'; activeWell = well; detailTab = 'runtime'; filterPeriod = 'all'; render(); }

// ─── RENDER ROOT ────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (page === 'wells') app.innerHTML = renderWellsGrid();
  else if (page === 'well_detail') app.innerHTML = renderWellDetail();
  else if (page === 'gnotes') app.innerHTML = renderGeneralNotes();
  attachHandlers();
}

// ─── WELLS GRID ─────────────────────────────────────────────────────────────
function renderWellsGrid() {
  const cards = WELLS.map(w => {
    const records = getRuntimeRecords(w.id);
    const last = records.length ? records[records.length-1].timestamp : 'No entries yet';
    const total = records.reduce((s,r) => s + (parseFloat(r.gallons)||0), 0);
    return `
      <div class="well-card" onclick="openWell(${JSON.stringify(w).replace(/"/g,'&quot;')})">
        <div class="well-name">💧 ${w.name}</div>
        <div class="well-meta">Last entry: ${last}</div>
        <div class="well-meta">Total logged: ${formatGal(total)}</div>
        <div class="well-badge">${records.length} runtime record${records.length!==1?'s':''}</div>
      </div>`;
  }).join('');
  return `
    <div class="section-header"><h2>WELL LOCATIONS</h2></div>
    <div class="wells-grid">${cards}</div>`;
}

// ─── WELL DETAIL ────────────────────────────────────────────────────────────
function renderWellDetail() {
  const tabs = [
    {id:'runtime',     label:'⏱ Runtime & Meter'},
    {id:'maintenance', label:'🔧 Maintenance Notes'},
    {id:'export',      label:'📤 Export'},
  ];
  const tabHtml = tabs.map(t => `<button class="dtab${detailTab===t.id?' active':''}" onclick="setDetailTab('${t.id}')">${t.label}</button>`).join('');
  let content = '';
  if (detailTab === 'runtime')     content = renderRuntimeTab();
  if (detailTab === 'maintenance') content = renderMaintenanceTab();
  if (detailTab === 'export')      content = renderExportTab();
  return `
    <div class="section-header">
      <h2>💧 ${activeWell.name}</h2>
      <button class="back-btn" onclick="showPage('wells')">← Back</button>
    </div>
    <div class="detail-tabs">${tabHtml}</div>
    ${content}`;
}

// ── Runtime Tab ──────────────────────────────────────────────────────────────
function renderRuntimeTab() {
  const records = filterRecords(getRuntimeRecords(activeWell.id));
  const totalGal = records.reduce((s,r) => s + (parseFloat(r.gallons)||0), 0);
  const totalHrs = records.reduce((s,r) => s + (parseFloat(r.hours)||0), 0);

  const rows = records.length ? [...records].reverse().map(r => `
    <tr>
      <td class="td-ts">${r.timestamp}</td>
      <td>${r.hours} hrs</td>
      <td>${Number(r.startMeter).toLocaleString()}</td>
      <td><strong style="color:var(--accent2)">${formatGal(r.gallons)}</strong></td>
      <td>${r.notes||'—'}</td>
      <td><button class="btn btn-red" onclick="deleteRuntime('${r.id}')">✕</button></td>
    </tr>`).join('') : `<tr><td colspan="7" class="empty-msg">No records yet. Add one below.</td></tr>`;

  return `
    <div class="stats-row">
      <div class="stat-chip"><div class="stat-label">Total Gallons</div><div class="stat-value">${totalGal.toLocaleString()}</div></div>
      <div class="stat-chip"><div class="stat-label">Total Run Hours</div><div class="stat-value">${totalHrs.toFixed(1)}</div></div>
      <div class="stat-chip"><div class="stat-label">Records</div><div class="stat-value">${records.length}</div></div>
    </div>

    <div class="records-header">
      <strong style="font-family:var(--font-h);font-size:.95rem;color:var(--muted)">RUNTIME RECORDS</strong>
      <div class="filter-row">
        <label style="margin:0">Filter:</label>
        <select onchange="setPeriod(this.value)">
          <option value="all"${filterPeriod==='all'?' selected':''}>All Time</option>
          <option value="1"${filterPeriod==='1'?' selected':''}>Last 1 Month</option>
          <option value="3"${filterPeriod==='3'?' selected':''}>Last 3 Months</option>
          <option value="6"${filterPeriod==='6'?' selected':''}>Last 6 Months</option>
          <option value="12"${filterPeriod==='12'?' selected':''}>Last 12 Months</option>
        </select>
      </div>
    </div>
    <div style="overflow-x:auto;margin-bottom:20px">
      <table>
        <thead><tr><th>Date/Time</th><th>Run Hrs</th><th>Meter Reading</th><th>Gallons</th><th>Notes</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="form-card">
      <h3>➕ Add Runtime / Meter Entry</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Run Time (hours)</label>
          <input type="number" id="rt_hours" placeholder="e.g. 8.5" step="0.1" min="0" />
        </div>
        <div class="form-group">
          <label>Meter Reading (gal)</label>
          <input type="number" id="rt_start" placeholder="e.g. 125000" min="0" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Notes (optional)</label>
          <input type="text" id="rt_notes" placeholder="Any observations…" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="addRuntime()">💾 Save Entry</button>
    </div>`;
}

// ── Maintenance Tab ──────────────────────────────────────────────────────────
function renderMaintenanceTab() {
  const notes = getMaintenanceNotes(activeWell.id);
  const items = notes.length ? [...notes].reverse().map(n => `
    <div class="note-item">
      <div class="note-ts">🕐 ${n.timestamp}</div>
      <div class="note-text">${escHtml(n.note)}</div>
      <div class="note-footer"><button class="btn btn-red" onclick="deleteMaintNote('${n.id}')">✕ Delete</button></div>
    </div>`).join('') : `<p class="empty-msg">No maintenance notes yet.</p>`;

  return `
    <div class="form-card">
      <h3>➕ Add Maintenance Note</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Note</label>
          <textarea id="maint_note" placeholder="Describe maintenance performed, issues found, parts replaced…"></textarea>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addMaintNote()">💾 Save Note</button>
    </div>
    <div>${items}</div>`;
}

// ── Export Tab ───────────────────────────────────────────────────────────────
function renderExportTab() {
  return `
    <div class="export-panel">
      <h3>📤 EXPORT RUNTIME & METER DATA</h3>
      <div class="export-row">
        <div class="form-group" style="min-width:150px">
          <label>Period</label>
          <select id="exp_period">
            <option value="all">All Time</option>
            <option value="1">Last 1 Month</option>
            <option value="3">Last 3 Months</option>
            <option value="6">Last 6 Months</option>
            <option value="12">Last 12 Months</option>
          </select>
        </div>
        <button class="btn btn-green" onclick="exportRuntime()">⬇ Download CSV</button>
      </div>
    </div>
    <div class="export-panel">
      <h3>📤 EXPORT MAINTENANCE NOTES</h3>
      <button class="btn btn-green" onclick="exportMaintenance()">⬇ Download CSV</button>
    </div>
    <div class="export-panel">
      <h3>📤 EXPORT ALL DATA (Full Report)</h3>
      <button class="btn btn-orange" onclick="exportAll()">⬇ Download Full CSV</button>
    </div>`;
}

// ─── GENERAL NOTES ──────────────────────────────────────────────────────────
function renderGeneralNotes() {
  const notes = getGeneralNotes();
  const items = notes.length ? [...notes].reverse().map(n => `
    <div class="note-item">
      <div class="note-ts">🕐 ${n.timestamp}</div>
      <div class="note-text">${escHtml(n.note)}</div>
      <div class="note-footer"><button class="btn btn-red" onclick="deleteGeneralNote('${n.id}')">✕ Delete</button></div>
    </div>`).join('') : `<p class="empty-msg">No general notes yet.</p>`;

  return `
    <div class="gnotes-wrap">
      <div class="section-header"><h2>📋 GENERAL MAINTENANCE NOTES</h2></div>
      <div class="form-card">
        <h3>➕ Add General Note</h3>
        <div class="form-group" style="margin-bottom:12px">
          <label>Note</label>
          <textarea id="gnote_text" placeholder="General maintenance notes, city-wide observations, vendor contacts…"></textarea>
        </div>
        <button class="btn btn-primary" onclick="addGeneralNote()">💾 Save Note</button>
      </div>
      <div class="export-panel" style="margin-bottom:16px">
        <h3>📤 EXPORT GENERAL NOTES</h3>
        <button class="btn btn-green" onclick="exportGeneralNotes()">⬇ Download CSV</button>
      </div>
      <div>${items}</div>
    </div>`;
}

// ─── HANDLERS ───────────────────────────────────────────────────────────────
function attachHandlers() {}  // event handlers set inline via onclick

function setDetailTab(t) { detailTab = t; render(); }
function setPeriod(v)    { filterPeriod = v; render(); }

function filterRecords(records) {
  if (filterPeriod === 'all') return records;
  const months = parseInt(filterPeriod);
  const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth() - months);
  return records.filter(r => new Date(r.timestamp) >= cutoff);
}

function addRuntime() {
  const hours = parseFloat(document.getElementById('rt_hours').value);
  const start = parseFloat(document.getElementById('rt_start').value);
  const notes = document.getElementById('rt_notes').value.trim();
  if (isNaN(hours)||hours<0) { alert('Please enter valid run time hours.'); return; }
  if (isNaN(start)) { alert('Please enter a meter reading.'); return; }
  const gallons = start;
  const records = getRuntimeRecords(activeWell.id);
  records.push({ id: uid(), wellId: activeWell.id, timestamp: ts(), hours, startMeter: start, gallons, notes });
  saveRuntimeRecords(activeWell.id, records);
  render();
}

function deleteRuntime(id) {
  if (!confirm('Delete this record?')) return;
  const records = getRuntimeRecords(activeWell.id).filter(r => r.id !== id);
  saveRuntimeRecords(activeWell.id, records);
  render();
}

function addMaintNote() {
  const note = document.getElementById('maint_note').value.trim();
  if (!note) { alert('Please enter a note.'); return; }
  const notes = getMaintenanceNotes(activeWell.id);
  notes.push({ id: uid(), wellId: activeWell.id, timestamp: ts(), note });
  saveMaintenanceNotes(activeWell.id, notes);
  render();
}

function deleteMaintNote(id) {
  if (!confirm('Delete this note?')) return;
  const notes = getMaintenanceNotes(activeWell.id).filter(n => n.id !== id);
  saveMaintenanceNotes(activeWell.id, notes);
  render();
}

function addGeneralNote() {
  const note = document.getElementById('gnote_text').value.trim();
  if (!note) { alert('Please enter a note.'); return; }
  const notes = getGeneralNotes();
  notes.push({ id: uid(), timestamp: ts(), note });
  saveGeneralNotes(notes);
  render();
}

function deleteGeneralNote(id) {
  if (!confirm('Delete this note?')) return;
  const notes = getGeneralNotes().filter(n => n.id !== id);
  saveGeneralNotes(notes);
  render();
}

// ─── EXPORT HELPERS ─────────────────────────────────────────────────────────
function csvDownload(filename, headers, rows) {
  const esc = v => `"${String(v??'').replace(/"/g,'""')}"`;
  const csv = [headers.map(esc).join(','), ...rows.map(r => r.map(esc).join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function exportRuntime() {
  const period = document.getElementById('exp_period').value;
  const saved = filterPeriod;
  filterPeriod = period;
  const records = filterRecords(getRuntimeRecords(activeWell.id));
  filterPeriod = saved;
  const headers = ['Well Name','Date/Time','Run Hours','Meter Reading (gal)','Gallons Through Meter','Notes'];
  const rows = records.map(r => [activeWell.name, r.timestamp, r.hours, r.startMeter, r.gallons, r.notes||'']);
  csvDownload(`${activeWell.id}_runtime_${new Date().toISOString().slice(0,10)}.csv`, headers, rows);
}

function exportMaintenance() {
  const notes = getMaintenanceNotes(activeWell.id);
  const headers = ['Well Name','Date/Time','Maintenance Note'];
  const rows = notes.map(n => [activeWell.name, n.timestamp, n.note]);
  csvDownload(`${activeWell.id}_maintenance_${new Date().toISOString().slice(0,10)}.csv`, headers, rows);
}

function exportAll() {
  const headers = ['Well Name','Type','Date/Time','Run Hours','Meter Reading','Gallons','Note'];
  const rows = [];
  WELLS.forEach(w => {
    getRuntimeRecords(w.id).forEach(r => rows.push([w.name,'Runtime',r.timestamp,r.hours,r.startMeter,r.gallons,r.notes||'']));
    getMaintenanceNotes(w.id).forEach(n => rows.push([w.name,'Maintenance',n.timestamp,'','','','',n.note]));
  });
  getGeneralNotes().forEach(n => rows.push(['(General)','General Note',n.timestamp,'','','','',n.note]));
  rows.sort((a,b) => new Date(a[2]) - new Date(b[2]));
  csvDownload(`CityOfForest_WaterWells_FULL_${new Date().toISOString().slice(0,10)}.csv`, headers, rows);
}

function exportGeneralNotes() {
  const notes = getGeneralNotes();
  const headers = ['Date/Time','General Note'];
  const rows = notes.map(n => [n.timestamp, n.note]);
  csvDownload(`general_notes_${new Date().toISOString().slice(0,10)}.csv`, headers, rows);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
